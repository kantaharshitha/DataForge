name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r api/requirements.txt

      - name: Run migrations
        env:
          PYTHONPATH: backend
          DATAFORGE_DB: /tmp/dataforge_ci.duckdb
          DATAFORGE_RAW_DIR: /tmp/dataforge_raw_ci
        run: |
          python backend/run_migrations.py

      - name: Run tests
        env:
          PYTHONPATH: backend
          DATAFORGE_DB: /tmp/dataforge_ci.duckdb
          DATAFORGE_RAW_DIR: /tmp/dataforge_raw_ci
        run: |
          pytest tests -q

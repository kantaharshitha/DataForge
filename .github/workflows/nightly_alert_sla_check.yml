name: Nightly Alert SLA Check

on:
  schedule:
    - cron: "55 2 * * *"
  workflow_dispatch:

jobs:
  sla_check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger alert SLA check endpoint
        env:
          DATAFORGE_BASE_URL: ${{ secrets.DATAFORGE_BASE_URL }}
          DATAFORGE_OPS_API_KEY: ${{ secrets.DATAFORGE_OPS_API_KEY }}
          DATAFORGE_SLA_WINDOW_HOURS: ${{ secrets.DATAFORGE_SLA_WINDOW_HOURS }}
        run: |
          if [ -z "$DATAFORGE_BASE_URL" ]; then
            echo "Missing DATAFORGE_BASE_URL secret"
            exit 1
          fi
          if [ -z "$DATAFORGE_OPS_API_KEY" ]; then
            echo "Missing DATAFORGE_OPS_API_KEY secret"
            exit 1
          fi

          WINDOW="${DATAFORGE_SLA_WINDOW_HOURS:-24}"
          URL="${DATAFORGE_BASE_URL%/}/ops/alerts/sla/check?window_hours=${WINDOW}"
          echo "Calling $URL"
          curl --fail-with-body -sS -X POST \
            -H "x-api-key: ${DATAFORGE_OPS_API_KEY}" \
            "$URL"
